query GetProfile {
  me {
    id
    email
    isEmailVerified
    avatarUrl
    profile {
      age
      bio
      fullName
      gender
    }
    measurements {
      heightCm
      weightKg
      waistCm
      armCm
      chestCm
      thighCm
      activityLevel
      nutritionGoal
      goalWeightKg
    }
  }
}
